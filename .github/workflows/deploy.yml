name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Inject secrets
        env:
          WIFI_PASS: ${{ secrets.WIFI_PASS }}
          PHONE_NUMBER: ${{ secrets.PHONE_NUMBER }}
        run: |
          sed -i "s/__WIFI_PASS__/$WIFI_PASS/g" index.html
          sed -i "s/__PHONE_NUMBER__/$PHONE_NUMBER/g" index.html

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - id: deployment
        uses: actions/deploy-pages@v4
