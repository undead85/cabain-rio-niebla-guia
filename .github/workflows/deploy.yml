name: Deploy to Cloudflare Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Inject secrets
        env:
          WIFI_PASS: ${{ secrets.WIFI_PASS }}
          PHONE_NUMBER: ${{ secrets.PHONE_NUMBER }}
          WIFI_NETWORK: ${{ secrets.WIFI_NETWORK || '--' }}
        run: |
          sed -i "s/__WIFI_PASS__/$WIFI_PASS/g" src/content/site.ts
          sed -i "s/__PHONE_NUMBER__/$PHONE_NUMBER/g" src/content/site.ts
          sed -i "s/__WIFI_NETWORK__/$WIFI_NETWORK/g" src/content/site.ts

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static export
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: cc7f705b663e3c9bdb32f78214a067d0
          command: pages deploy out --project-name=cabain-rio-niebla-guia
