name: Deploy to Cloudflare Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Inject secrets
        env:
          WIFI_PASS: ${{ secrets.WIFI_PASS }}
          PHONE_NUMBER: ${{ secrets.PHONE_NUMBER }}
        run: |
          sed -i "s/__WIFI_PASS__/$WIFI_PASS/g" index.html
          sed -i "s/__PHONE_NUMBER__/$PHONE_NUMBER/g" index.html

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: cc7f705b663e3c9bdb32f78214a067d0
          command: pages deploy . --project-name=cabain-rio-niebla-guia
